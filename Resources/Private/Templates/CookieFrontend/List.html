<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="content">

    <f:if condition="{frontendSettings.custombutton}">
        <f:then>
            <f:format.raw>{frontendSettings.customButtonHtml}</f:format.raw>
        </f:then>
        <f:else>
            <div class="cf-cookie-openconsent">
                <a role="button" data-cc="c-settings" href="#" title="{f:translate(key: 'LLL:EXT:cf_cookiemanager/Resources/Private/Language/locallang.xlf:frontend_open_consent_title')}" aria-haspopup="dialog">
                    <f:image title="{f:translate(key: 'LLL:EXT:cf_cookiemanager/Resources/Private/Language/locallang.xlf:frontend_settings_button_title')}" alt="{f:translate(key: 'LLL:EXT:cf_cookiemanager/Resources/Private/Language/locallang.xlf:frontend_logo_alt')}" width="30" src="EXT:cf_cookiemanager/Resources/Public/Icons/Extension.svg"/>
                </a>
            </div>
        </f:else>
    </f:if>

</f:section>
</html>
